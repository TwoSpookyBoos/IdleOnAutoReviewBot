<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            height: 100vh;
            width: 100vw;

            #backgrounds {
                position: absolute; /* Changed from 'fixed' to allow translateY */
                top: 0;
                left: 0;
                z-index: -11;
                height: 125vh;
                width: 100vw;
                overflow: hidden;
                transition: transform 0.5s ease; /* Smooth scrolling effect */

                .background-image {
                    position: absolute; /* Changed from 'fixed' */
                    top: 0;
                    height: 100%;
                    width: 100%;
                    z-index: -10;

                    &.focused {
                        z-index: -2 !important;
                    }

                    div {
                        z-index: -1;
                        position: fixed;
                        top: 0;

                        height: 100%;
                        width: 100%;

                        background-size: cover;
                        background-position: left top;

                        &.bg-sky {
                            z-index: -2;
                            width: 9600px;
                            height: 540px;
                            min-width: calc(960px * 3);
                            background-size: contain;
                            animation: clouds 60s linear infinite;
                        }
                    }
                }
            }

            .content {
                display: flex;
                width: 100%;
                flex-direction: column;

                article:nth-child(1) {
                    height: 300vh;
                    background: rgba(0,0,0,0.2);
                }
                article:nth-child(2) {
                    height: 400vh;
                }
                article:nth-child(3) {
                    height: 500vh;
                    background: rgba(0,0,0,0.2);
                }
                article:nth-child(4) {
                    height: 600vh;
                }
                article:nth-child(5) {
                    height: 500vh;
                    background: rgba(0,0,0,0.2);
                }
                article:nth-child(6) {
                    height: 400vh;
                }
            }

        }

        @keyframes clouds {
            from {background-position-x: 0;}
            to   {background-position-x: -960px;}
        }
    </style>
</head>
<body>
    <div id="backgrounds">
        <div id="bg-blunder-hills" class="background-image focused">
            <div style="background-image: url(backgrounds/bg_1_blunder_hills_sky.png)" class="bg-sky"></div>
            <div style="background-image: url(backgrounds/bg_1_blunder_hills.png)"></div>
        </div>
        <div id="bg-yum-yum-desert" class="background-image">
            <div style="background-image: url(backgrounds/bg_2_yum_yum_desert.png)"></div>
        </div>
        <div id="bg-frostbite-tundra" class="background-image">
            <div style="background-image: url(backgrounds/bg_3_frostbite_tundra_sky.png)" class="bg-sky"></div>
            <div style="background-image: url(backgrounds/bg_3_frostbite_tundra.png)"></div>
        </div>
        <div id="bg-hyperion-nebula" class="background-image">
            <div style="background-image: url(backgrounds/bg_4_hyperion_nebula.png)"></div>
        </div>
        <div id="bg-smoulderin-plateau" class="background-image">
            <div style="background-image: url(backgrounds/bg_5_smoulderin_plateau.png)"></div>
        </div>
        <div id="bg-spirited-valley" class="background-image">
            <div style="background-image: url(backgrounds/bg_6_spirited_valley.png)"></div>
        </div>
    </div>
    <div class="content">
        <article class="blunder-hills"></article>
        <article class="yum-yum-desert"></article>
        <article class="frostbite-tundra"></article>
        <article class="hyperion-nebula"></article>
        <article class="smoulderin-plateau"></article>
        <article class="spirited-valley"></article>
    </div>
    <script>
function createObserver() {
    let currentDominantElement = null;

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const articleClass = entry.target.getAttribute('class');
            const rect = entry.target.getBoundingClientRect();
            const viewportHeight = window.innerHeight;
            const scrollY = window.scrollY;

            // Check if the article's top and bottom cross the middle of the viewport
            if (rect.top < viewportHeight / 2 && rect.bottom > viewportHeight / 2) {
                if (currentDominantElement !== entry.target) {
                    currentDominantElement = entry.target;

                    // Bring the corresponding background image to the front
                    const background = document.querySelector(`#bg-${articleClass}`);

                    // Remove 'focused' class from all background images
                    document.querySelectorAll('.background-image').forEach(bg => bg.classList.remove('focused'));

                    // Add 'focused' class to the matching background image
                    background.classList.add('focused');

                    // Adjust #backgrounds position based on the scroll position
                    const backgrounds = document.getElementById('backgrounds');
                    backgrounds.style.transform = `translateY(${scrollY}px)`;
                }
            }
        });
    }, {
        root: null, // Use viewport as root
        // threshold: [0] // Trigger when any part of the element enters the viewport
    });

    // Start observing each article
    const targetElements = document.querySelectorAll('article');
    targetElements.forEach(e => observer.observe(e));
}

// Create the observer on page load
window.onload = () => {
    createObserver();
};

</script>
    </body>
</html>
